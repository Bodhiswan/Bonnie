<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <title>Native Australian flowers — line art background tile</title>
  <defs>
    <style>
      .stem { fill: none; stroke: #6b4a32; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
      .leaf { fill: none; stroke: #6b4a32; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .bloom { fill: none; stroke: #6b4a32; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .fine { fill: none; stroke: #6b4a32; stroke-width: 0.9; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- ========== Rice flower (top-left) ========== -->
  <g transform="translate(90,80)">
    <path class="stem" d="M20 240 C 18 180, 28 120, 22 40"/>
    <!-- cluster 1 (top) -->
    <g transform="translate(22,40)">
      <circle class="bloom" cx="0" cy="0" r="6"/>
      <circle class="bloom" cx="8" cy="-6" r="5"/>
      <circle class="bloom" cx="-7" cy="-5" r="5"/>
      <circle class="bloom" cx="-4" cy="-12" r="5"/>
      <circle class="bloom" cx="5" cy="-14" r="4"/>
      <circle class="bloom" cx="10" cy="2" r="4"/>
      <circle class="bloom" cx="-10" cy="3" r="4"/>
      <circle class="bloom" cx="0" cy="-20" r="4"/>
      <circle class="bloom" cx="-12" cy="-10" r="3"/>
      <circle class="bloom" cx="12" cy="-10" r="3"/>
    </g>
    <!-- cluster 2 (lower side) -->
    <g transform="translate(-8,120)">
      <circle class="bloom" cx="0" cy="0" r="5"/>
      <circle class="bloom" cx="7" cy="-4" r="4"/>
      <circle class="bloom" cx="-6" cy="-5" r="4"/>
      <circle class="bloom" cx="3" cy="-10" r="4"/>
      <circle class="bloom" cx="-3" cy="-12" r="3"/>
      <circle class="bloom" cx="9" cy="3" r="3"/>
    </g>
    <path class="stem" d="M20 120 q-14 0 -28 0"/>
    <!-- small leaves on stem -->
    <path class="leaf" d="M22 80 q10 -4 16 -14"/>
    <path class="leaf" d="M22 80 q-8 -2 -14 -10"/>
    <path class="leaf" d="M21 160 q12 -2 18 -12"/>
    <path class="leaf" d="M20 200 q-12 0 -20 -10"/>
    <path class="leaf" d="M21 220 q14 -2 22 -14"/>
  </g>

  <!-- ========== Eucalyptus blossom (top-right) ========== -->
  <g transform="translate(330,70)">
    <path class="stem" d="M60 20 C 60 90, 50 160, 40 240"/>
    <!-- Hanging gumnut cluster -->
    <g transform="translate(60,20)">
      <!-- stems to flowers -->
      <path class="stem" d="M0 0 q-14 20 -20 40"/>
      <path class="stem" d="M0 0 q8 20 6 46"/>
      <!-- flower 1 -->
      <g transform="translate(-22,42)">
        <circle class="bloom" cx="0" cy="0" r="10"/>
        <g class="fine">
          <line x1="0" y1="0" x2="0" y2="-14"/>
          <line x1="0" y1="0" x2="3" y2="-14"/>
          <line x1="0" y1="0" x2="-3" y2="-14"/>
          <line x1="0" y1="0" x2="6" y2="-13"/>
          <line x1="0" y1="0" x2="-6" y2="-13"/>
          <line x1="0" y1="0" x2="9" y2="-11"/>
          <line x1="0" y1="0" x2="-9" y2="-11"/>
          <line x1="0" y1="0" x2="12" y2="-8"/>
          <line x1="0" y1="0" x2="-12" y2="-8"/>
          <line x1="0" y1="0" x2="14" y2="-4"/>
          <line x1="0" y1="0" x2="-14" y2="-4"/>
          <line x1="0" y1="0" x2="14" y2="0"/>
          <line x1="0" y1="0" x2="-14" y2="0"/>
        </g>
      </g>
      <!-- flower 2 -->
      <g transform="translate(6,48)">
        <circle class="bloom" cx="0" cy="0" r="11"/>
        <g class="fine">
          <line x1="0" y1="0" x2="0" y2="-15"/>
          <line x1="0" y1="0" x2="4" y2="-15"/>
          <line x1="0" y1="0" x2="-4" y2="-15"/>
          <line x1="0" y1="0" x2="8" y2="-13"/>
          <line x1="0" y1="0" x2="-8" y2="-13"/>
          <line x1="0" y1="0" x2="12" y2="-10"/>
          <line x1="0" y1="0" x2="-12" y2="-10"/>
          <line x1="0" y1="0" x2="14" y2="-5"/>
          <line x1="0" y1="0" x2="-14" y2="-5"/>
          <line x1="0" y1="0" x2="15" y2="0"/>
          <line x1="0" y1="0" x2="-15" y2="0"/>
        </g>
      </g>
    </g>
    <!-- long eucalyptus leaves -->
    <path class="leaf" d="M55 60 q30 30 40 90 q-10 -4 -18 -22 q-16 -30 -22 -68 z"/>
    <path class="leaf" d="M50 120 q26 40 30 110 q-14 -8 -22 -30 q-12 -34 -8 -80 z"/>
    <path class="leaf" d="M42 200 q22 30 22 90 q-12 -6 -18 -24 q-10 -30 -4 -66 z"/>
  </g>

  <!-- ========== Grevillea (bottom-left) ========== -->
  <g transform="translate(90,330)">
    <path class="stem" d="M80 240 C 70 170, 90 100, 70 30"/>
    <!-- spike of curled florets -->
    <g transform="translate(70,30)">
      <g class="bloom">
        <path d="M0 0 q-8 -6 -4 -16 q8 2 6 14"/>
        <path d="M4 10 q-10 -4 -6 -16 q10 0 8 14"/>
        <path d="M-2 20 q-10 -2 -8 -14 q10 -2 10 12"/>
        <path d="M4 32 q-10 -2 -6 -16 q10 -2 8 14"/>
        <path d="M-2 42 q-10 0 -8 -14 q10 -2 10 12"/>
        <path d="M4 54 q-10 -2 -6 -16 q10 -2 8 14"/>
        <path d="M-2 66 q-10 0 -8 -14 q10 -2 10 12"/>
        <path d="M4 78 q-10 -2 -6 -16 q10 -2 8 14"/>
        <path d="M-2 90 q-10 0 -8 -14 q10 -2 10 12"/>
        <path d="M2 102 q-10 -2 -6 -16 q10 -2 8 14"/>
      </g>
      <!-- little style tips -->
      <g class="fine">
        <path d="M-4 -12 q2 -6 6 -4"/>
        <path d="M-2 4 q2 -6 6 -4"/>
        <path d="M-4 18 q2 -6 6 -4"/>
        <path d="M-2 30 q2 -6 6 -4"/>
      </g>
    </g>
    <!-- slender leaves -->
    <path class="leaf" d="M78 140 q28 -10 44 -34"/>
    <path class="leaf" d="M80 170 q-28 -4 -46 -22"/>
    <path class="leaf" d="M78 200 q28 -6 48 -26"/>
    <path class="leaf" d="M80 230 q-26 0 -46 -16"/>
    <path class="leaf" d="M82 120 q24 -4 38 -22"/>
  </g>

  <!-- ========== Golden wattle (bottom-right) ========== -->
  <g transform="translate(360,330)">
    <path class="stem" d="M60 240 C 70 170, 50 100, 70 20"/>
    <!-- wattle blossom balls along stem -->
    <g transform="translate(70,20)">
      <g class="bloom">
        <circle cx="0" cy="0" r="5"/>
        <circle cx="10" cy="-4" r="5"/>
        <circle cx="-8" cy="-4" r="5"/>
        <circle cx="16" cy="6" r="5"/>
        <circle cx="-14" cy="6" r="5"/>
        <circle cx="6" cy="12" r="5"/>
        <circle cx="-4" cy="14" r="5"/>
        <circle cx="22" cy="-4" r="4"/>
        <circle cx="-22" cy="-4" r="4"/>
      </g>
      <g class="fine">
        <circle cx="0" cy="0" r="2"/>
        <circle cx="10" cy="-4" r="2"/>
        <circle cx="-8" cy="-4" r="2"/>
        <circle cx="16" cy="6" r="2"/>
        <circle cx="-14" cy="6" r="2"/>
      </g>
    </g>
    <g transform="translate(58,90)">
      <g class="bloom">
        <circle cx="0" cy="0" r="4"/>
        <circle cx="8" cy="-3" r="4"/>
        <circle cx="-7" cy="-3" r="4"/>
        <circle cx="4" cy="8" r="4"/>
        <circle cx="-4" cy="8" r="4"/>
      </g>
    </g>
    <g transform="translate(72,150)">
      <g class="bloom">
        <circle cx="0" cy="0" r="4"/>
        <circle cx="8" cy="-3" r="4"/>
        <circle cx="-7" cy="-3" r="4"/>
        <circle cx="4" cy="8" r="4"/>
        <circle cx="-4" cy="8" r="4"/>
      </g>
    </g>
    <!-- long narrow phyllodes -->
    <path class="leaf" d="M66 60 q22 2 40 -12"/>
    <path class="leaf" d="M64 120 q-24 0 -40 -14"/>
    <path class="leaf" d="M70 180 q24 4 42 -10"/>
    <path class="leaf" d="M62 210 q-26 0 -42 -16"/>
  </g>

</svg>
